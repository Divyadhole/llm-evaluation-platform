services:
  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: local
      POSTGRES_URL: postgresql://llm_eval:llm_eval@postgres:5432/llm_eval
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8100:8100"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    ports:
      - "5175:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: llm_eval
      POSTGRES_USER: llm_eval
      POSTGRES_PASSWORD: llm_eval
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  postgres_data:
